name: Deploy To ECS

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy.yml'
      - 'apps/**'
      - 'services/**'
      - 'infra/**'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override. Leave blank to use the commit SHA.
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'ecs-commerce-demo' }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'production/terraform.tfstate' }}
  CLOUD_MAP_NAMESPACE: ${{ vars.CLOUD_MAP_NAMESPACE || 'commerce.local' }}
  API_GATEWAY_STAGE: ${{ vars.API_GATEWAY_STAGE || 'prod' }}
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
  TF_IN_AUTOMATION: true

concurrency:
  group: ecs-commerce-demo-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Apply Terraform, Push Images, Update ECS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.8

      - name: Validate required GitHub configuration
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${TF_STATE_BUCKET}" ]]; then
            echo "TF_STATE_BUCKET GitHub variable is required."
            exit 1
          fi

          if [[ -z "${AWS_ROLE_TO_ASSUME}" ]]; then
            echo "AWS_ROLE_TO_ASSUME GitHub variable is required."
            exit 1
          fi

          if [[ -z "${{ secrets.TF_VAR_db_password }}" ]]; then
            echo "TF_VAR_db_password GitHub secret is required."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Confirm Terraform state bucket exists
        shell: bash
        run: |
          set -euo pipefail

          if ! aws s3api head-bucket --bucket "${TF_STATE_BUCKET}" 2>/dev/null; then
            echo "Terraform state bucket not found: ${TF_STATE_BUCKET}"
            echo "Run the Bootstrap Terraform Backend workflow first."
            exit 1
          fi

      - name: Decide image tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          image_tag=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            image_tag="${{ github.event.inputs.image_tag }}"
          fi

          if [[ -z "${image_tag}" ]]; then
            image_tag="${GITHUB_SHA::12}"
          fi

          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Render backend config for Terraform
        shell: bash
        run: |
          set -euo pipefail

          cat > infra/terraform/backend.hcl <<EOF
          bucket       = "${TF_STATE_BUCKET}"
          key          = "${TF_STATE_KEY}"
          region       = "${AWS_REGION}"
          use_lockfile = true
          EOF

      - name: Initialize Terraform with remote state
        run: terraform init -input=false -backend-config=backend.hcl
        working-directory: infra/terraform

      - name: Import existing AWS resources into Terraform state
        working-directory: infra/terraform
        shell: bash
        run: |
          set -euo pipefail

          import_if_exists() {
            local resource="$1"
            local id="$2"
            if terraform state show "${resource}" &>/dev/null; then
              echo "SKIP  ${resource} already in state"
            else
              echo "IMPORT ${resource} => ${id}"
              terraform import "${resource}" "${id}" || true
            fi
          }

          # ECR Repositories
          import_if_exists 'aws_ecr_repository.service["cart"]'         "${PROJECT_NAME}-cart"
          import_if_exists 'aws_ecr_repository.service["catalog"]'      "${PROJECT_NAME}-catalog"
          import_if_exists 'aws_ecr_repository.service["frontend"]'     "${PROJECT_NAME}-frontend"
          import_if_exists 'aws_ecr_repository.service["gateway"]'      "${PROJECT_NAME}-gateway"
          import_if_exists 'aws_ecr_repository.service["notification"]' "${PROJECT_NAME}-notification"
          import_if_exists 'aws_ecr_repository.service["order"]'        "${PROJECT_NAME}-order"
          import_if_exists 'aws_ecr_repository.service["payment"]'      "${PROJECT_NAME}-payment"

          # CloudWatch Log Groups
          import_if_exists 'aws_cloudwatch_log_group.service["cart"]'         "/ecs/${PROJECT_NAME}/cart"
          import_if_exists 'aws_cloudwatch_log_group.service["catalog"]'      "/ecs/${PROJECT_NAME}/catalog"
          import_if_exists 'aws_cloudwatch_log_group.service["frontend"]'     "/ecs/${PROJECT_NAME}/frontend"
          import_if_exists 'aws_cloudwatch_log_group.service["gateway"]'      "/ecs/${PROJECT_NAME}/gateway"
          import_if_exists 'aws_cloudwatch_log_group.service["notification"]' "/ecs/${PROJECT_NAME}/notification"
          import_if_exists 'aws_cloudwatch_log_group.service["order"]'        "/ecs/${PROJECT_NAME}/order"
          import_if_exists 'aws_cloudwatch_log_group.service["payment"]'      "/ecs/${PROJECT_NAME}/payment"

          # ---------------------------------------------------------------
          # RDS Subnet Group
          # If the existing subnet group belongs to a different VPC than the
          # one Terraform just created, it cannot be updated in-place.
          # Delete it from AWS + state so Terraform recreates it cleanly.
          # ---------------------------------------------------------------
          CURRENT_RDS_SUBNET=$(aws rds describe-db-subnet-groups \
            --db-subnet-group-name "${PROJECT_NAME}-db-subnets" \
            --query 'DBSubnetGroups[0].Subnets[0].SubnetIdentifier' \
            --output text 2>/dev/null || echo "NONE")

          if [[ "${CURRENT_RDS_SUBNET}" != "NONE" && "${CURRENT_RDS_SUBNET}" != "None" ]]; then
            OLD_VPC=$(aws ec2 describe-subnets \
              --subnet-ids "${CURRENT_RDS_SUBNET}" \
              --query 'Subnets[0].VpcId' --output text 2>/dev/null || echo "NONE")
            NEW_VPC=$(aws ec2 describe-subnets \
              --subnet-ids subnet-08b672f4e496705f4 \
              --query 'Subnets[0].VpcId' --output text 2>/dev/null || echo "NONE")

            if [[ "${OLD_VPC}" != "${NEW_VPC}" ]]; then
              echo "RDS subnet group is from old VPC (${OLD_VPC}) — deleting and letting Terraform recreate..."
              terraform state rm aws_db_subnet_group.main || true
              aws rds delete-db-subnet-group \
                --db-subnet-group-name "${PROJECT_NAME}-db-subnets" || true
            else
              import_if_exists aws_db_subnet_group.main "${PROJECT_NAME}-db-subnets"
            fi
          fi

          # ---------------------------------------------------------------
          # ElastiCache Subnet Group + Redis Cluster
          # Cannot update the subnet group while a Redis cluster is using it.
          # If subnets are from a different VPC, delete cluster + subnet group
          # so Terraform can recreate both.
          # ---------------------------------------------------------------
          CURRENT_CACHE_SUBNET=$(aws elasticache describe-cache-subnet-groups \
            --cache-subnet-group-name "${PROJECT_NAME}-cache-subnets" \
            --query 'CacheSubnetGroups[0].Subnets[0].SubnetIdentifier' \
            --output text 2>/dev/null || echo "NONE")

          if [[ "${CURRENT_CACHE_SUBNET}" != "NONE" && "${CURRENT_CACHE_SUBNET}" != "None" ]]; then
            OLD_CACHE_VPC=$(aws ec2 describe-subnets \
              --subnet-ids "${CURRENT_CACHE_SUBNET}" \
              --query 'Subnets[0].VpcId' --output text 2>/dev/null || echo "NONE")
            NEW_VPC=$(aws ec2 describe-subnets \
              --subnet-ids subnet-08b672f4e496705f4 \
              --query 'Subnets[0].VpcId' --output text 2>/dev/null || echo "NONE")

            if [[ "${OLD_CACHE_VPC}" != "${NEW_VPC}" ]]; then
              echo "ElastiCache subnet group is from old VPC (${OLD_CACHE_VPC}) — deleting Redis cluster first..."

              CLUSTER_STATUS=$(aws elasticache describe-cache-clusters \
                --cache-cluster-id "${PROJECT_NAME}-redis" \
                --query 'CacheClusters[0].CacheClusterStatus' \
                --output text 2>/dev/null || echo "NONE")

              if [[ "${CLUSTER_STATUS}" != "NONE" && "${CLUSTER_STATUS}" != "None" ]]; then
                echo "Deleting Redis cluster (status: ${CLUSTER_STATUS})..."
                aws elasticache delete-cache-cluster \
                  --cache-cluster-id "${PROJECT_NAME}-redis" || true
                echo "Waiting for Redis deletion (up to 10 min)..."
                aws elasticache wait cache-cluster-deleted \
                  --cache-cluster-id "${PROJECT_NAME}-redis" || true
              fi

              aws elasticache delete-cache-subnet-group \
                --cache-subnet-group-name "${PROJECT_NAME}-cache-subnets" || true

              terraform state rm aws_elasticache_cluster.redis || true
              terraform state rm aws_elasticache_subnet_group.main || true
            else
              import_if_exists aws_elasticache_subnet_group.main "${PROJECT_NAME}-cache-subnets"
            fi
          fi

      - name: Check whether ECR repositories already exist
        id: bootstrap
        shell: bash
        run: |
          set -euo pipefail

          if aws ecr describe-repositories \
            --region "${AWS_REGION}" \
            --repository-names "${PROJECT_NAME}-frontend" >/dev/null 2>&1; then
            echo "bootstrap_needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "bootstrap_needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bootstrap Terraform infrastructure without ECS services
        if: steps.bootstrap.outputs.bootstrap_needed == 'true'
        run: |
          terraform apply -auto-approve \
            -var "aws_region=${AWS_REGION}" \
            -var "project_name=${PROJECT_NAME}" \
            -var "db_password=${{ secrets.TF_VAR_db_password }}" \
            -var "deploy_ecs_services=false" \
            -var "image_tag=${{ steps.meta.outputs.image_tag }}" \
            -var "cloud_map_namespace=${CLOUD_MAP_NAMESPACE}" \
            -var "api_gateway_stage=${API_GATEWAY_STAGE}"
        working-directory: infra/terraform

      - name: Get AWS account id
        id: aws
        shell: bash
        run: |
          set -euo pipefail
          echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push container images
        shell: bash
        env:
          ACCOUNT_ID: ${{ steps.aws.outputs.account_id }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          set -euo pipefail

          registry="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          services=(
            "frontend:apps/frontend"
            "gateway:services/gateway"
            "catalog:services/catalog"
            "cart:services/cart"
            "order:services/order"
            "payment:services/payment"
            "notification:services/notification"
          )

          for entry in "${services[@]}"; do
            name="${entry%%:*}"
            path="${entry#*:}"
            image_uri="${registry}/${PROJECT_NAME}-${name}:${IMAGE_TAG}"

            echo "Building ${image_uri}"
            docker build --tag "${image_uri}" "${path}"
            docker push "${image_uri}"
          done

      - name: Apply Terraform with the new image tag
        run: |
          terraform apply -auto-approve \
            -var "aws_region=${AWS_REGION}" \
            -var "project_name=${PROJECT_NAME}" \
            -var "db_password=${{ secrets.TF_VAR_db_password }}" \
            -var "deploy_ecs_services=true" \
            -var "image_tag=${{ steps.meta.outputs.image_tag }}" \
            -var "cloud_map_namespace=${CLOUD_MAP_NAMESPACE}" \
            -var "api_gateway_stage=${API_GATEWAY_STAGE}"
        working-directory: infra/terraform

      - name: Summarize deployment outputs
        shell: bash
        run: |
          set -euo pipefail

          frontend_url="$(terraform output -raw frontend_url)"
          api_gateway_url="$(terraform output -raw api_gateway_url)"
          cloud_map_namespace="$(terraform output -raw cloud_map_namespace)"

          {
            echo "## Deployment complete"
            echo
            echo "- Image tag: ${{ steps.meta.outputs.image_tag }}"
            echo "- Frontend URL: ${frontend_url}"
            echo "- API Gateway URL: ${api_gateway_url}"
            echo "- Cloud Map namespace: ${cloud_map_namespace}"
          } >> "$GITHUB_STEP_SUMMARY"
        working-directory: infra/terraform
