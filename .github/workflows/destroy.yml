name: Destroy AWS Demo Stack

on:
  workflow_dispatch:
    inputs:
      confirm_project_name:
        description: Type the exact project name to confirm destroy.
        required: true
        type: string
      destroy_backend_bucket:
        description: Also delete the Terraform state bucket after destroy.
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'ecs-commerce-demo' }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'production/terraform.tfstate' }}
  CLOUD_MAP_NAMESPACE: ${{ vars.CLOUD_MAP_NAMESPACE || 'commerce.local' }}
  API_GATEWAY_STAGE: ${{ vars.API_GATEWAY_STAGE || 'prod' }}
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
  TF_IN_AUTOMATION: true

concurrency:
  group: ecs-commerce-demo-destroy
  cancel-in-progress: false

jobs:
  destroy:
    name: Destroy Terraform-managed AWS resources
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Validate required GitHub configuration
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${TF_STATE_BUCKET}" ]]; then
            echo "TF_STATE_BUCKET GitHub variable is required."
            exit 1
          fi
          if [[ -z "${AWS_ROLE_TO_ASSUME}" ]]; then
            echo "AWS_ROLE_TO_ASSUME GitHub variable is required."
            exit 1
          fi
          if [[ -z "${{ secrets.TF_VAR_db_password }}" ]]; then
            echo "TF_VAR_db_password GitHub secret is required."
            exit 1
          fi

      - name: Confirm manual destroy request
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event.inputs.confirm_project_name }}" != "${PROJECT_NAME}" ]]; then
            echo "Confirmation failed. Type the exact project name: ${PROJECT_NAME}"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Confirm Terraform state bucket exists
        shell: bash
        run: |
          set -euo pipefail
          if ! aws s3api head-bucket --bucket "${TF_STATE_BUCKET}" 2>/dev/null; then
            echo "Terraform state bucket not found: ${TF_STATE_BUCKET}"
            echo "Nothing to destroy from the remote backend."
            exit 1
          fi

      - name: Render backend config for Terraform
        shell: bash
        run: |
          set -euo pipefail
          cat > infra/terraform/backend.hcl <<EOF
          bucket       = "${TF_STATE_BUCKET}"
          key          = "${TF_STATE_KEY}"
          region       = "${AWS_REGION}"
          use_lockfile = true
          EOF

      - name: Initialize Terraform with remote state
        run: terraform init -input=false -backend-config=backend.hcl
        working-directory: infra/terraform

      - name: Destroy the ECS demo stack
        run: |
          terraform destroy -auto-approve \
            -var "aws_region=${AWS_REGION}" \
            -var "project_name=${PROJECT_NAME}" \
            -var "db_password=${{ secrets.TF_VAR_db_password }}" \
            -var "deploy_ecs_services=false" \
            -var "cloud_map_namespace=${CLOUD_MAP_NAMESPACE}" \
            -var "api_gateway_stage=${API_GATEWAY_STAGE}"
        working-directory: infra/terraform

      - name: Remove known ECR repositories for this demo project
        shell: bash
        run: |
          set -euo pipefail
          services=(frontend gateway catalog cart order payment notification)
          for service in "${services[@]}"; do
            repository_name="${PROJECT_NAME}-${service}"
            if aws ecr describe-repositories --region "${AWS_REGION}" --repository-names "${repository_name}" >/dev/null 2>&1; then
              aws ecr delete-repository --region "${AWS_REGION}" --repository-name "${repository_name}" --force
              echo "Deleted ECR repository: ${repository_name}"
            else
              echo "ECR repository not found (skipping): ${repository_name}"
            fi
          done

      - name: Remove Terraform state objects from S3
        shell: bash
        run: |
          set -euo pipefail
          aws s3 rm "s3://${TF_STATE_BUCKET}/${TF_STATE_KEY}" || true
          aws s3 rm "s3://${TF_STATE_BUCKET}/${TF_STATE_KEY}.tflock" || true

      - name: Optionally delete the Terraform backend bucket
        if: github.event.inputs.destroy_backend_bucket == 'true'
        shell: bash
        run: |
          set -euo pipefail

          echo "Deleting all object versions from ${TF_STATE_BUCKET}..."

          # Delete all object versions
          VERSIONS=$(aws s3api list-object-versions --bucket "${TF_STATE_BUCKET}" \
            --query 'Versions[].{Key:Key,VersionId:VersionId}' \
            --output json 2>/dev/null || echo "[]")

          echo "$VERSIONS" | jq -c '.[]?' | while read obj; do
            KEY=$(echo "$obj" | jq -r '.Key')
            VID=$(echo "$obj" | jq -r '.VersionId')
            aws s3api delete-object --bucket "${TF_STATE_BUCKET}" --key "$KEY" --version-id "$VID"
            echo "Deleted version: $KEY ($VID)"
          done

          # Delete all delete markers
          MARKERS=$(aws s3api list-object-versions --bucket "${TF_STATE_BUCKET}" \
            --query 'DeleteMarkers[].{Key:Key,VersionId:VersionId}' \
            --output json 2>/dev/null || echo "[]")

          echo "$MARKERS" | jq -c '.[]?' | while read obj; do
            KEY=$(echo "$obj" | jq -r '.Key')
            VID=$(echo "$obj" | jq -r '.VersionId')
            aws s3api delete-object --bucket "${TF_STATE_BUCKET}" --key "$KEY" --version-id "$VID"
            echo "Deleted marker: $KEY ($VID)"
          done

          echo "Removing bucket ${TF_STATE_BUCKET}..."
          aws s3api delete-bucket --bucket "${TF_STATE_BUCKET}" --region "${AWS_REGION}"
          echo "✅ Bucket deleted successfully"

      - name: Summarize destroy result
        shell: bash
        run: |
          {
            echo "## Destroy complete"
            echo
            echo "- Project: ${PROJECT_NAME}"
            echo "- Region: ${AWS_REGION}"
            echo "- State bucket removed: ${{ github.event.inputs.destroy_backend_bucket }}"
          } >> "$GITHUB_STEP_SUMMARY"
